# Regression test definitions
# Format: test_name machine_type nex_file screenshot_delay_frames [extra_cli_args...]
#
# screenshot_delay_frames is in EMULATED frames, not wall-clock seconds.
# This decouples results from host CPU speed so the same reference
# captures the same emulator state regardless of whether the runner is
# fast or slow. 50 frames ≈ 1 s on a 50 Hz machine; 60 frames ≈ 1 s on
# a 60 Hz machine.
#
# Lines starting with # are comments. Blank lines are ignored.
# Reference images are stored as test/img/<test_name>-reference.png
# Generator: bash test/generate-references.sh [test_name…]

boot-48k          48k     BOOT                150
boot-128k         128k    BOOT                250
boot-plus3        plus3   BOOT                250
boot-pentagon     pentagon BOOT               250
palette-demo      next    demo/palette_demo/palette_demo.nex           150
copper-demo       next    demo/copper_demo/copper_demo.nex            150
floating-bus      48k     demo/floating_bus_test/floating_bus_test.nex      150
tilemap-demo      next    demo/tilemap_demo/tilemap_demo.nex           150
contention-test   48k     demo/contention_test/contention_test.nex        250
layer2-320x256    next    demo/layer2_320x256_test/layer2_320x256_test.nex    150
layer2-640x256    next    demo/layer2_640x256_test/layer2_640x256_test.nex    150
sprite-scaling    next    demo/sprite_scaling_test/sprite_scaling_test.nex    150
sprite-anchor     next    demo/sprite_anchor_test/sprite_anchor_test.nex    150

# TAP loading tests (need longer delay: 100-frame boot + auto-type + load)
tap-demo          48k     demo/beeper_demo/beeper_demo.tap              300

# Screenshot tests for magic features (visual output on screen)
magic-bp-demo     next    demo/magic_bp_demo/magic_bp_demo.nex          150
magic-port-demo   next    demo/magic_port_demo/magic_port_demo.nex        150

# David Crespo's nexlib tests (pre-built NEX files)
dapr-l2empty      next    demo/dapr-nexlib+tests/test00alltests/test01l2empty.nex       150
dapr-layer2       next    demo/dapr-nexlib+tests/test00alltests/test02layer2.nex        150
dapr-sprite       next    demo/dapr-nexlib+tests/test00alltests/test03sprite.nex        150
dapr-tilemap_00   next    demo/dapr-nexlib+tests/test00alltests/test04tilemap.nex       200  --delayed-keypress 2 0
dapr-tilemap_01   next    demo/dapr-nexlib+tests/test00alltests/test04tilemap.nex       200  --delayed-keypress 2 1
dapr-tilemap_02   next    demo/dapr-nexlib+tests/test00alltests/test04tilemap.nex       200  --delayed-keypress 2 2
dapr-print        next    demo/dapr-nexlib+tests/test00alltests/test05print.nex         150
# Interactive tests (moved to test/interactive/, require user input)
# dapr-keyb, dapr-joystick, dapr-covox, dapr-videoint
dapr-tilemapper_00 next   demo/dapr-nexlib+tests/test00alltests/test10tilemapper.nex    200  --delayed-keypress 2 0
