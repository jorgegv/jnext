# Regression test definitions
# Format: test_name machine_type nex_file screenshot_delay_secs [extra_cli_args...]
# Lines starting with # are comments. Blank lines are ignored.
# Reference images are stored as test/img/<test_name>-reference.png

boot-48k          48k     BOOT                3
boot-128k         128k    BOOT                5
boot-plus3        plus3   BOOT                5
boot-pentagon     pentagon BOOT               5
palette-demo      next    demo/palette_demo/palette_demo.nex           3
copper-demo       next    demo/copper_demo/copper_demo.nex            3
floating-bus      48k     demo/floating_bus_test/floating_bus_test.nex      3
tilemap-demo      next    demo/tilemap_demo/tilemap_demo.nex           3
contention-test   48k     demo/contention_test/contention_test.nex        5
layer2-320x256    next    demo/layer2_320x256_test/layer2_320x256_test.nex    3
layer2-640x256    next    demo/layer2_640x256_test/layer2_640x256_test.nex    3
sprite-scaling    next    demo/sprite_scaling_test/sprite_scaling_test.nex    3
sprite-anchor     next    demo/sprite_anchor_test/sprite_anchor_test.nex    3

# TAP loading tests (need longer delay: 100-frame boot + auto-type + load)
tap-demo          48k     demo/beeper_demo/beeper_demo.tap              6

# Screenshot tests for magic features (visual output on screen)
magic-bp-demo     next    demo/magic_bp_demo/magic_bp_demo.nex          3
magic-port-demo   next    demo/magic_port_demo/magic_port_demo.nex        3

# David Crespo's nexlib tests (pre-built NEX files)
# These tests run at 28 MHz — headless mode needs ~2s wall-clock per emulated second
dapr-l2empty      next    demo/dapr-nexlib+tests/test00alltests/test01l2empty.nex       3
dapr-layer2       next    demo/dapr-nexlib+tests/test00alltests/test02layer2.nex        3
dapr-sprite       next    demo/dapr-nexlib+tests/test00alltests/test03sprite.nex        3
dapr-tilemap_00   next    demo/dapr-nexlib+tests/test00alltests/test04tilemap.nex       4  --delayed-keypress 2 0
dapr-tilemap_01   next    demo/dapr-nexlib+tests/test00alltests/test04tilemap.nex       4  --delayed-keypress 2 1
dapr-tilemap_02   next    demo/dapr-nexlib+tests/test00alltests/test04tilemap.nex       4  --delayed-keypress 2 2
dapr-print        next    demo/dapr-nexlib+tests/test00alltests/test05print.nex         3
# Interactive tests (moved to test/interactive/, require user input)
# dapr-keyb, dapr-joystick, dapr-covox, dapr-videoint
dapr-tilemapper_00 next   demo/dapr-nexlib+tests/test00alltests/test10tilemapper.nex    4  --delayed-keypress 2 0
dapr-tilemapper_01 next   demo/dapr-nexlib+tests/test00alltests/test10tilemapper.nex    4  --delayed-keypress 2 1
